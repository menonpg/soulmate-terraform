name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]
      region:
        description: 'GCP region'
        required: true
        default: 'us-east1'
      admin_email:
        description: 'Admin email for IAP'
        required: true
        default: 'pmenon@aats.org'
      enable_iap:
        description: 'Enable Identity-Aware Proxy'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  TF_VERSION: '1.7.0'
  PROJECT_ID: soulmate-489217

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          terraform plan \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ inputs.region }}" \
            -var="admin_email=${{ inputs.admin_email }}" \
            -var="enable_iap=${{ inputs.enable_iap }}" \
            -var="soulmate_image=pgmenon/soulmate-api:latest" \
            -out=tfplan
        continue-on-error: false

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ inputs.region }}" \
            -var="admin_email=${{ inputs.admin_email }}" \
            -var="enable_iap=${{ inputs.enable_iap }}" \
            -var="soulmate_image=pgmenon/soulmate-api:latest"

      - name: Show Outputs
        if: inputs.action == 'apply'
        run: terraform output
