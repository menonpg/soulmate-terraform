name: GCP Deploy (Manual, One Resource at a Time)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Terraform resource to deploy"
        required: true
        default: "google_cloud_run_v2_service.soulmate_api"
      module:
        description: "Module folder (root | enterprise-demo)"
        required: true
        default: "enterprise-demo"
      action:
        description: "plan or apply"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VAR_project_id:    ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_admin_email:   ${{ secrets.GCP_ADMIN_EMAIL }}
  TF_VAR_region:        us-central1
  TF_VAR_anthropic_key: ${{ secrets.TF_VAR_anthropic_key }}

jobs:
  terraform:
    name: "${{ inputs.action }} → ${{ inputs.target }}"
    runs-on: ubuntu-latest
    environment: gcp-production
    defaults:
      run:
        working-directory: ${{ inputs.module == 'enterprise-demo' && 'examples/enterprise-demo' || '.' }}

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -target="${{ inputs.target }}" -out=tfplan

      - name: Import existing resources (avoids 409 on re-apply)
        if: inputs.action == 'apply'
        continue-on-error: true
        run: |
          case "${{ inputs.target }}" in
            google_service_account.demo_agent)
              terraform import google_service_account.demo_agent \
                projects/soulmate-489217/serviceAccounts/soulmate-demo-agent@soulmate-489217.iam.gserviceaccount.com
              ;;
          esac

      - name: Terraform Re-Plan (after import)
        if: inputs.action == 'apply'
        run: terraform plan -target="${{ inputs.target }}" -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -target="${{ inputs.target }}" -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -target="${{ inputs.target }}" -auto-approve
